<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>git'play</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@200;300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --black: #080808;
  --white: #f5f5f0;
  --grey-1: #111;
  --grey-2: #1c1c1c;
  --grey-3: #2e2e2e;
  --grey-4: #555;
  --grey-5: #888;
  --grey-6: #bbb;
  --radius: 20px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
}

/* ─── VIEWS ──────────────────────────────────────── */
.view { position: fixed; inset: 0; display: flex; flex-direction: column; transition: transform 0.45s cubic-bezier(0.32,0.72,0,1), opacity 0.45s ease; will-change: transform; }
.view.hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }

/* ─── PLAYER VIEW ────────────────────────────────── */
#playerView {
  background: var(--black);
  z-index: 10;
}

/* blurred backdrop */
.backdrop {
  position: absolute; inset: 0;
  background: var(--black);
  overflow: hidden;
  z-index: 0;
}
.backdrop-img {
  position: absolute; inset: -40px;
  background-size: cover;
  background-position: center;
  filter: blur(60px) brightness(0.25) saturate(0);
  transform: scale(1.1);
  transition: background-image 0.8s ease;
  opacity: 0.7;
}

.player-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100%;
  padding-top: calc(var(--safe-top) + 16px);
  padding-bottom: calc(var(--safe-bottom) + 20px);
}

/* top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px 0;
  margin-bottom: 24px;
  flex-shrink: 0;
}
.app-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-style: italic;
  letter-spacing: 0.01em;
  color: var(--white);
  opacity: 0.9;
}
.topbar-btn {
  background: none; border: none; cursor: pointer;
  color: var(--grey-5); padding: 6px;
  border-radius: 50%; transition: color 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.topbar-btn:hover { color: var(--white); }

/* artwork */
.artwork-wrap {
  flex-shrink: 0;
  display: flex; justify-content: center;
  padding: 0 32px;
  margin-bottom: 32px;
}
.artwork {
  width: min(280px, calc(100vw - 80px));
  height: min(280px, calc(100vw - 80px));
  border-radius: 16px;
  background: var(--grey-2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.5);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
  position: relative;
}
.artwork.playing {
  transform: scale(1.04);
  box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 12px 32px rgba(0,0,0,0.6);
}
.artwork-char {
  font-family: 'Playfair Display', serif;
  font-size: 6rem;
  color: var(--grey-3);
  font-style: italic;
  user-select: none;
  transition: color 0.4s;
}

/* track info */
.track-info {
  padding: 0 32px;
  margin-bottom: 28px;
  flex-shrink: 0;
}
.track-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-artist {
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--grey-5);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-album {
  font-size: 0.78rem;
  font-weight: 300;
  color: var(--grey-4);
  margin-top: 2px;
  font-style: italic;
}

/* progress */
.progress-section {
  padding: 0 32px;
  margin-bottom: 24px;
  flex-shrink: 0;
}
.progress-track {
  width: 100%; height: 3px;
  background: var(--grey-3);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  margin-bottom: 10px;
}
.progress-fill {
  height: 100%; width: 0%;
  background: var(--white);
  border-radius: 2px;
  transition: width 0.15s linear;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute; right: -6px; top: -5px;
  width: 13px; height: 13px;
  background: var(--white); border-radius: 50%;
  opacity: 0; transition: opacity 0.2s;
}
.progress-track:hover .progress-fill::after,
.progress-track:active .progress-fill::after { opacity: 1; }
.time-row {
  display: flex; justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem; color: var(--grey-4);
  letter-spacing: 0.05em;
}

/* controls */
.controls {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  margin-bottom: 28px;
  flex-shrink: 0;
}
.ctrl {
  background: none; border: none; cursor: pointer;
  color: var(--grey-5);
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; padding: 8px;
  transition: color 0.15s, transform 0.12s;
}
.ctrl:hover { color: var(--white); }
.ctrl:active { transform: scale(0.88); }
.ctrl.on { color: var(--white); }

.play-pause {
  width: 68px; height: 68px;
  background: var(--white);
  border: none; border-radius: 50%;
  color: var(--black);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  flex-shrink: 0;
}
.play-pause:hover { transform: scale(1.06); }
.play-pause:active { transform: scale(0.93); }

/* visualizer */
.visualizer {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 3px; height: 36px;
  padding: 0 32px;
  margin-bottom: 16px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.4s;
}
.visualizer.active { opacity: 1; }
.vbar {
  width: 3px; height: 3px;
  background: var(--white);
  border-radius: 2px 2px 0 0;
  transition: height 0.05s;
  opacity: 0.6;
}

/* library handle */
.library-handle {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; cursor: pointer;
  padding: 0 0 4px;
  transition: opacity 0.2s;
}
.library-handle:hover { opacity: 0.7; }
.handle-pill {
  width: 36px; height: 4px;
  background: var(--grey-3); border-radius: 2px;
}
.handle-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.25em;
  color: var(--grey-4); text-transform: uppercase;
}

/* ─── LIBRARY VIEW ───────────────────────────────── */
#libraryView {
  background: var(--grey-1);
  z-index: 20;
  transform: translateX(-100%);
  opacity: 0;
  border-radius: 0 var(--radius) var(--radius) 0;
  width: min(85vw, 360px);
  right: auto;
  box-shadow: 8px 0 40px rgba(0,0,0,0.6);
}
#libraryView.open {
  transform: translateX(0);
  opacity: 1;
  pointer-events: all;
}

/* dim overlay behind drawer */
#drawerOverlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 15;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
#drawerOverlay.open { opacity: 1; pointer-events: all; }

.lib-header {
  flex-shrink: 0;
  padding: calc(var(--safe-top) + 20px) 24px 16px;
  border-bottom: 1px solid #1e1e1e;
}
.lib-drag {
  font-size: 1.1rem; color: var(--grey-4);
  cursor: pointer; margin-bottom: 16px;
  display: inline-block;
  transition: color 0.2s;
}
.lib-drag:hover { color: var(--white); }
.lib-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.lib-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; }
.lib-count { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--grey-4); letter-spacing: 0.15em; }

.lib-search {
  display: flex; align-items: center; gap: 10px;
  background: var(--grey-2); border-radius: 10px;
  padding: 10px 14px;
}
.lib-search input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--white); font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem; font-weight: 300;
}
.lib-search input::placeholder { color: var(--grey-4); }

.lib-playlists {
  flex-shrink: 0;
  display: flex; gap: 8px;
  padding: 12px 24px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid #1a1a1a;
}
.lib-playlists::-webkit-scrollbar { display: none; }
.pl-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.75rem; font-weight: 400;
  cursor: pointer;
  background: var(--grey-2); color: var(--grey-5);
  border: 1px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.pl-chip.active { background: var(--white); color: var(--black); border-color: var(--white); }
.pl-chip:hover:not(.active) { border-color: var(--grey-3); color: var(--grey-6); }

.track-list {
  flex: 1; overflow-y: auto;
  padding: 8px 0 calc(var(--safe-bottom) + 80px);
}
.track-list::-webkit-scrollbar { width: 2px; }
.track-list::-webkit-scrollbar-thumb { background: var(--grey-3); border-radius: 1px; }

.track-row {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 24px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s;
  position: relative;
}
.track-row:hover { background: var(--grey-2); }
.track-row.active { background: rgba(245,245,240,0.05); }

.track-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem; color: var(--grey-4);
  width: 20px; text-align: right; flex-shrink: 0;
}
.track-row.active .track-num { display: none; }
.track-eq {
  display: none; width: 20px; flex-shrink: 0;
  align-items: flex-end; justify-content: center; gap: 2px; height: 16px;
}
.track-row.active .track-eq { display: flex; }
.eq-bar { width: 2px; background: var(--white); border-radius: 1px; animation: eqBounce 0.5s ease-in-out infinite alternate; }
.eq-bar:nth-child(2) { animation-delay: 0.17s; }
.eq-bar:nth-child(3) { animation-delay: 0.34s; }
@keyframes eqBounce { from { height: 3px; } to { height: 14px; } }

.track-thumb {
  width: 44px; height: 44px; border-radius: 8px;
  background: var(--grey-2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; color: var(--grey-3); font-style: italic;
  border: 1px solid var(--grey-3);
  flex-shrink: 0;
}
.track-row.active .track-thumb { border-color: var(--grey-5); }

.track-meta { flex: 1; overflow: hidden; }
.track-meta-name {
  font-size: 0.88rem; font-weight: 400; color: var(--grey-6);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-row.active .track-meta-name { color: var(--white); font-weight: 500; }
.track-meta-artist {
  font-size: 0.74rem; font-weight: 300; color: var(--grey-4);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px;
}

.track-dur {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem; color: var(--grey-4); flex-shrink: 0;
}

/* mini player bar */
.mini-player {
  position: absolute;
  bottom: calc(var(--safe-bottom) + 12px);
  left: 12px; right: 12px;
  background: rgba(40,40,40,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 14px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  z-index: 30;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  transition: transform 0.2s, opacity 0.3s;
}
.mini-player.hidden { transform: translateY(120%); opacity: 0; pointer-events: none; }
.mini-thumb {
  width: 38px; height: 38px; border-radius: 8px;
  background: var(--grey-3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 1rem; color: var(--grey-4);
}
.mini-info { flex: 1; overflow: hidden; }
.mini-title { font-size: 0.82rem; font-weight: 400; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-artist { font-size: 0.7rem; color: var(--grey-4); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-controls { display: flex; gap: 4px; align-items: center; }
.mini-btn {
  background: none; border: none; color: var(--grey-5);
  cursor: pointer; padding: 6px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s;
}
.mini-btn:hover { color: var(--white); }

/* ─── TRANSITIONS ────────────────────────────────── */
#playerView.slide-up { transform: translateY(0); opacity: 1; }

/* ─── LOADING STATE ──────────────────────────────── */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; height: 100%;
  color: var(--grey-4);
}
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--grey-4); display: inline-block;
  animation: ldot 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes ldot { 0%,80%,100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

/* ─── RESPONSIVE ─────────────────────────────────── */
@media (min-width: 600px) {
  .artwork { width: 300px; height: 300px; }
  .controls { padding: 0 40px; }
  .play-pause { width: 76px; height: 76px; }
}
@media (min-width: 1024px) {
  #playerView { max-width: 480px; margin: 0 auto; }
  #libraryView { border-radius: 0 var(--radius) var(--radius) 0; top: 0; }
}
</style>
</head>
<body>

<!-- ─── PLAYER VIEW ─────────────────────────────── -->
<div class="view" id="playerView">
  <div class="backdrop"><div class="backdrop-img" id="backdropImg"></div></div>

  <div class="player-content">
    <!-- topbar -->
    <div class="topbar">
      <span class="app-name">git'play</span>
      <button class="topbar-btn" id="moreBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </button>
    </div>

    <!-- artwork -->
    <div class="artwork-wrap">
      <div class="artwork" id="artwork">
        <div class="artwork-char" id="artworkChar">♩</div>
      </div>
    </div>

    <!-- track info -->
    <div class="track-info">
      <div class="track-title" id="trackTitle">Nothing playing</div>
      <div class="track-artist" id="trackArtist">Open library to begin</div>
      <div class="track-album" id="trackAlbum"></div>
    </div>

    <!-- progress -->
    <div class="progress-section">
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="timeCur">0:00</span>
        <span id="timeTot">0:00</span>
      </div>
    </div>

    <!-- controls -->
    <div class="controls">
      <button class="ctrl" id="shuffleBtn" title="Shuffle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl" id="prevBtn" title="Previous">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><rect x="5" y="4" width="2.5" height="16" rx="1"/></svg>
      </button>
      <button class="play-pause" id="playBtn">
        <svg id="playIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl" id="nextBtn" title="Next">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><rect x="16.5" y="4" width="2.5" height="16" rx="1"/></svg>
      </button>
      <button class="ctrl" id="repeatBtn" title="Repeat">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <!-- visualizer -->
    <div class="visualizer" id="visualizer"></div>

    <!-- library handle -->
    <div class="library-handle" id="libraryHandleBtn">
      <div class="handle-pill"></div>
      <div class="handle-label">Library</div>
    </div>
  </div>
</div>

<!-- dim overlay -->
<div id="drawerOverlay"></div>

<!-- ─── LIBRARY VIEW ────────────────────────────── -->
<div class="view" id="libraryView">
  <div class="lib-header">
    <div class="lib-drag" id="libDrag" title="Close library">←</div>
    <div class="lib-top">
      <div class="lib-title">Library</div>
      <div class="lib-count" id="libCount">— tracks</div>
    </div>
    <div class="lib-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search songs, artists…"/>
    </div>
  </div>

  <div class="lib-playlists" id="plChips"></div>

  <div class="track-list" id="trackList">
    <div class="loading-state">
      <div style="display:flex;gap:6px">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
      <div style="font-size:0.8rem;color:var(--grey-4)">Loading library…</div>
    </div>
  </div>

  <!-- mini player shown while library is open -->
  <div class="mini-player hidden" id="miniPlayer">
    <div class="mini-thumb" id="miniThumb">♩</div>
    <div class="mini-info">
      <div class="mini-title" id="miniTitle">—</div>
      <div class="mini-artist" id="miniArtist">—</div>
    </div>
    <div class="mini-controls">
      <button class="mini-btn" id="miniPrev">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><rect x="5" y="4" width="2" height="16" rx="1"/></svg>
      </button>
      <button class="mini-btn" id="miniPlay">
        <svg id="miniPlayIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="mini-btn" id="miniNext">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><rect x="16" y="4" width="2" height="16" rx="1"/></svg>
      </button>
    </div>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
// ─── STATE ─────────────────────────────────────────
let library = [];
let playlists = [{ id: 'all', name: 'All' }];
let currentPlaylist = 'all';
let currentIdx = -1;
let isPlaying = false;
let isShuffle = false;
let repeatMode = 0; // 0=off 1=all 2=one
let shuffleOrder = [];

const audio = document.getElementById('audioEl');
audio.volume = 1;

// ─── VISUALIZER ────────────────────────────────────
const vizEl = document.getElementById('visualizer');
const N_BARS = 36;
const vbars = [];
for (let i = 0; i < N_BARS; i++) {
  const b = document.createElement('div');
  b.className = 'vbar';
  vizEl.appendChild(b);
  vbars.push(b);
}
let audioCtx, analyser, srcNode, vizRaf;

function setupAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  srcNode = audioCtx.createMediaElementSource(audio);
  srcNode.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function startViz() {
  vizEl.classList.add('active');
  const data = new Uint8Array(analyser.frequencyBinCount);
  const step = Math.floor(data.length / N_BARS);
  function tick() {
    vizRaf = requestAnimationFrame(tick);
    analyser.getByteFrequencyData(data);
    vbars.forEach((b, i) => {
      const v = data[i * step] || 0;
      b.style.height = Math.max(3, (v / 255) * 36) + 'px';
    });
  }
  tick();
}
function stopViz() {
  cancelAnimationFrame(vizRaf);
  vizEl.classList.remove('active');
  vbars.forEach(b => b.style.height = '3px');
}

// ─── LOAD songs.json ───────────────────────────────
async function init() {
  try {
    const res = await fetch('songs.json?v=' + Date.now());
    if (!res.ok) throw new Error();
    const json = await res.json();
    const songs = Array.isArray(json) ? json : json.songs;
    library = songs.map((s, i) => ({
      id: i,
      name: s.title || s.file.replace(/\.[^/.]+$/, ''),
      artist: s.artist || 'Unknown',
      album: s.album || '',
      url: 'music/' + s.file,
      duration: s.duration || 0
    }));

    // fill durations if missing
    library.forEach(t => {
      if (!t.duration) {
        const tmp = new Audio(t.url);
        tmp.addEventListener('loadedmetadata', () => { t.duration = tmp.duration; renderTrackList(); });
      }
    });

    document.getElementById('libCount').textContent = library.length + ' tracks';
    buildShuffleOrder();
    renderPlChips();
    renderTrackList();
  } catch {
    document.getElementById('trackList').innerHTML = `
      <div class="loading-state" style="gap:16px">
        <div style="font-size:2rem;opacity:0.3">♩</div>
        <div style="font-size:0.82rem;color:var(--grey-4);text-align:center;line-height:1.6">
          No songs.json found.<br>Run <code style="color:var(--grey-6)">node generate.js</code><br>then push to GitHub.
        </div>
      </div>`;
  }
}

// ─── PLAYLISTS ─────────────────────────────────────
function renderPlChips() {
  const el = document.getElementById('plChips');
  el.innerHTML = playlists.map(p => `
    <div class="pl-chip ${p.id === currentPlaylist ? 'active' : ''}" data-id="${p.id}">${p.name}</div>
  `).join('');
  el.querySelectorAll('.pl-chip').forEach(c => {
    c.addEventListener('click', () => {
      currentPlaylist = c.dataset.id;
      renderPlChips();
      renderTrackList();
    });
  });
}

function getVisible() {
  const pl = playlists.find(p => p.id === currentPlaylist);
  let tracks = pl?.trackIds ? library.filter(t => pl.trackIds.includes(t.id)) : library;
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (q) tracks = tracks.filter(t => t.name.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q));
  return tracks;
}

// ─── TRACK LIST ────────────────────────────────────
function renderTrackList() {
  const el = document.getElementById('trackList');
  const tracks = getVisible();

  if (!tracks.length) {
    el.innerHTML = `<div class="loading-state"><div style="font-size:0.8rem;color:var(--grey-4)">No tracks found</div></div>`;
    return;
  }

  el.innerHTML = tracks.map((t, i) => `
    <div class="track-row ${t.id === currentId() ? 'active' : ''}" data-id="${t.id}">
      <div class="track-num">${i + 1}</div>
      <div class="track-eq">
        <div class="eq-bar" style="height:5px"></div>
        <div class="eq-bar" style="height:10px"></div>
        <div class="eq-bar" style="height:7px"></div>
      </div>
      <div class="track-thumb">${t.name[0]?.toUpperCase() || '♩'}</div>
      <div class="track-meta">
        <div class="track-meta-name">${t.name}</div>
        <div class="track-meta-artist">${t.artist}${t.album ? ' · ' + t.album : ''}</div>
      </div>
      <div class="track-dur">${fmt(t.duration)}</div>
    </div>
  `).join('');

  el.querySelectorAll('.track-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = parseInt(row.dataset.id);
      const idx = library.findIndex(t => t.id === id);
      loadTrack(idx, true);
    });
  });
}

function currentId() { return library[currentIdx]?.id ?? -1; }

// ─── PLAYBACK ──────────────────────────────────────
function loadTrack(idx, play = false) {
  if (idx < 0 || idx >= library.length) return;
  currentIdx = idx;
  const t = library[idx];

  audio.src = t.url + '?v=' + Date.now();

  // update player UI
  document.getElementById('trackTitle').textContent = t.name;
  document.getElementById('trackArtist').textContent = t.artist;
  document.getElementById('trackAlbum').textContent = t.album;
  document.getElementById('artworkChar').textContent = t.name[0]?.toUpperCase() || '♩';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('timeCur').textContent = '0:00';
  document.getElementById('timeTot').textContent = fmt(t.duration);

  // update mini player
  document.getElementById('miniTitle').textContent = t.name;
  document.getElementById('miniArtist').textContent = t.artist;
  document.getElementById('miniThumb').textContent = t.name[0]?.toUpperCase() || '♩';
  document.getElementById('miniPlayer').classList.remove('hidden');

  renderTrackList();
  if (play) doPlay();
}

function doPlay() {
  setupAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  audio.play();
  isPlaying = true;
  updatePlayBtns();
  startViz();
  document.getElementById('artwork').classList.add('playing');
}

function doPause() {
  audio.pause();
  isPlaying = false;
  updatePlayBtns();
  stopViz();
  document.getElementById('artwork').classList.remove('playing');
}

function updatePlayBtns() {
  const pauseIcon = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
  const playIcon  = '<polygon points="5 3 19 12 5 21 5 3"/>';
  document.getElementById('playIcon').innerHTML     = isPlaying ? pauseIcon : playIcon;
  document.getElementById('miniPlayIcon').innerHTML = isPlaying ? pauseIcon : playIcon;
}

function navigate(dir) {
  if (!library.length) return;
  const visible = getVisible();
  if (!visible.length) return;
  if (isShuffle) {
    const pos  = shuffleOrder.indexOf(currentIdx);
    const next = shuffleOrder[(pos + dir + shuffleOrder.length) % shuffleOrder.length];
    loadTrack(next, true);
  } else {
    const ci   = visible.findIndex(t => t.id === currentId());
    const ni   = (ci + dir + visible.length) % visible.length;
    loadTrack(library.findIndex(t => t.id === visible[ni].id), true);
  }
}

audio.addEventListener('ended', () => {
  if (repeatMode === 2) { audio.currentTime = 0; doPlay(); return; }
  if (repeatMode === 1) { navigate(1); return; }
  const visible = getVisible();
  const ci = visible.findIndex(t => t.id === currentId());
  if (ci < visible.length - 1) navigate(1);
  else { isPlaying = false; updatePlayBtns(); stopViz(); document.getElementById('artwork').classList.remove('playing'); }
});

// ─── PROGRESS ──────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeCur').textContent = fmt(audio.currentTime);
  document.getElementById('timeTot').textContent = fmt(audio.duration);
});

document.getElementById('progressTrack').addEventListener('click', e => {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

// touch scrubbing on progress
let scrubbing = false;
document.getElementById('progressTrack').addEventListener('touchstart', e => { scrubbing = true; scrub(e.touches[0]); }, { passive: true });
document.addEventListener('touchmove', e => { if (scrubbing) scrub(e.touches[0]); }, { passive: true });
document.addEventListener('touchend', () => { scrubbing = false; });
function scrub(touch) {
  if (!audio.duration) return;
  const r = document.getElementById('progressTrack').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (touch.clientX - r.left) / r.width));
  audio.currentTime = pct * audio.duration;
}

// ─── CONTROLS ──────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', () => {
  if (!library.length) return openLibrary();
  if (currentIdx === -1) { loadTrack(0, true); return; }
  isPlaying ? doPause() : doPlay();
});
document.getElementById('prevBtn').addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  navigate(-1);
});
document.getElementById('nextBtn').addEventListener('click', () => navigate(1));

document.getElementById('shuffleBtn').addEventListener('click', () => {
  isShuffle = !isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('on', isShuffle);
  if (isShuffle) buildShuffleOrder();
});

document.getElementById('repeatBtn').addEventListener('click', () => {
  repeatMode = (repeatMode + 1) % 3;
  const btn = document.getElementById('repeatBtn');
  btn.classList.toggle('on', repeatMode > 0);
  btn.title = ['Repeat off', 'Repeat all', 'Repeat one'][repeatMode];
  // show "1" badge for repeat-one
  btn.style.position = 'relative';
  const old = btn.querySelector('.rep-badge');
  if (old) old.remove();
  if (repeatMode === 2) {
    const badge = document.createElement('span');
    badge.className = 'rep-badge';
    badge.style.cssText = 'position:absolute;top:2px;right:2px;font-size:0.45rem;font-family:DM Mono,monospace;color:var(--white);background:var(--grey-3);border-radius:3px;padding:1px 2px;';
    badge.textContent = '1';
    btn.appendChild(badge);
  }
});

// mini player controls
document.getElementById('miniPlay').addEventListener('click', e => { e.stopPropagation(); isPlaying ? doPause() : doPlay(); });
document.getElementById('miniPrev').addEventListener('click', e => { e.stopPropagation(); navigate(-1); });
document.getElementById('miniNext').addEventListener('click', e => { e.stopPropagation(); navigate(1); });
document.getElementById('miniPlayer').addEventListener('click', closeLibrary);

// ─── LIBRARY OPEN/CLOSE ────────────────────────────
function openLibrary()  { snapOpen();  }
function closeLibrary() { snapClose(); }

document.getElementById('libraryHandleBtn').addEventListener('click', openLibrary);
document.getElementById('libDrag').addEventListener('click', closeLibrary);
document.getElementById('drawerOverlay').addEventListener('click', closeLibrary);
document.getElementById('miniPlayer').addEventListener('click', closeLibrary);

// ─── SWIPE GESTURE (left drawer) ──────────────────
const drawer    = document.getElementById('libraryView');
const overlay   = document.getElementById('drawerOverlay');
const drawerW   = () => drawer.getBoundingClientRect().width || window.innerWidth * 0.85;

let gStartX = 0, gStartY = 0, gDragging = false, gDir = null;

// Helper: snap drawer to position instantly (no transition)
function setDrawerPos(x) {
  drawer.style.transition = 'none';
  overlay.style.transition = 'none';
  const w = drawerW();
  const clamped = Math.max(-w, Math.min(0, x));
  drawer.style.transform = `translateX(${clamped}px)`;
  overlay.style.opacity  = 1 + clamped / w; // 0 when fully hidden, 1 when open
}

function snapOpen() {
  drawer.style.transition  = '';
  overlay.style.transition = '';
  drawer.classList.add('open');
  overlay.classList.add('open');
  drawer.style.transform   = '';
  overlay.style.opacity    = '';
}

function snapClose() {
  drawer.style.transition  = '';
  overlay.style.transition = '';
  drawer.classList.remove('open');
  overlay.classList.remove('open');
  drawer.style.transform   = '';
  overlay.style.opacity    = '';
}

// Touch on the PLAYER — swipe right anywhere (not just edge) to open
document.getElementById('playerView').addEventListener('touchstart', e => {
  gStartX  = e.touches[0].clientX;
  gStartY  = e.touches[0].clientY;
  gDir     = null;
  gDragging = false;
}, { passive: true });

document.getElementById('playerView').addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - gStartX;
  const dy = Math.abs(e.touches[0].clientY - gStartY);
  if (!gDir) gDir = Math.abs(dx) > dy ? 'h' : 'v';
  if (gDir !== 'h' || dx < 0) return;
  gDragging = true;
  const w = drawerW();
  setDrawerPos(dx - w);
}, { passive: true });

document.getElementById('playerView').addEventListener('touchend', e => {
  if (!gDragging) { gDragging = false; return; }
  const dx = e.changedTouches[0].clientX - gStartX;
  dx > 80 ? snapOpen() : snapClose();
  gDragging = false;
}, { passive: true });

// Touch on the DRAWER — swipe left to close
drawer.addEventListener('touchstart', e => {
  // don't intercept scrolling inside track list
  if (e.target.closest('.track-list')) {
    gDir = null; gDragging = false; return;
  }
  gStartX  = e.touches[0].clientX;
  gStartY  = e.touches[0].clientY;
  gDir     = null;
  gDragging = false;
}, { passive: true });

drawer.addEventListener('touchmove', e => {
  if (e.target.closest('.track-list')) return;
  const dx = e.touches[0].clientX - gStartX;
  const dy = Math.abs(e.touches[0].clientY - gStartY);
  if (!gDir) gDir = Math.abs(dx) > dy ? 'h' : 'v';
  if (gDir !== 'h' || dx > 0) return;
  gDragging = true;
  setDrawerPos(dx);
}, { passive: true });

drawer.addEventListener('touchend', e => {
  if (!gDragging) return;
  const dx = e.changedTouches[0].clientX - gStartX;
  dx < -60 ? snapClose() : snapOpen();
  gDragging = false;
}, { passive: true });

document.getElementById('searchInput').addEventListener('input', renderTrackList);

// ─── SHUFFLE ───────────────────────────────────────
function buildShuffleOrder() {
  shuffleOrder = library.map((_, i) => i).sort(() => Math.random() - 0.5);
}

// ─── UTILS ─────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
}

// ─── BOOT ──────────────────────────────────────────
init();
</script>
</body>
